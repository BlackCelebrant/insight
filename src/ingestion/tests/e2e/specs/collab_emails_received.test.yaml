spec_version: 1
description: >
  Per-metric E2E check for m365_emails_received (#1413). Seeds
  bronze_m365.email_activity for 3 people in one team (Engineering) and asserts
  the IC Bullet Collaboration metric (…0012): value = the requested member's
  period total, median/range = over their team. Includes a verbatim-duplicate
  row (same unique_key) to pin RMT/union_by_tag dedup (received must stay 100,
  not 200).

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol

  bronze_m365.email_activity:
    - $ref: templates/m365_email.yaml#/templates/alice_email
      reportRefreshDate: "2026-01-05"
      unique_key: m365-alice-recv-20260105
      receiveCount: 100
    - $ref: templates/m365_email.yaml#/templates/alice_email      # duplicate → dedup: stays 100
      reportRefreshDate: "2026-01-05"
      unique_key: m365-alice-recv-20260105
      receiveCount: 100
    - $ref: templates/m365_email.yaml#/templates/bob_email
      reportRefreshDate: "2026-01-05"
      unique_key: m365-bob-recv-20260105
      receiveCount: 50
    - $ref: templates/m365_email.yaml#/templates/carol_email
      reportRefreshDate: "2026-01-05"
      unique_key: m365-carol-recv-20260105
      receiveCount: 25

cases:
  # team m365_emails_received = [alice 100, bob 50, carol 25]
  #   value (alice) = 100 ; median = quantileExact(0.5)[25,50,100] = 50 ; range = [25,100]
  - name: m365_emails_received — IC bullet (alice value vs team median/range)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        find: { metric_key: m365_emails_received }
        equal: { value: 100, median: 50, range_min: 25, range_max: 100 }
